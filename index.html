<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>모집요강 자료실</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f4ed;
    --paper: #fffdf7;
    --ink: #1a1a1a;
    --muted: #6b6358;
    --line: #d9d2c2;
    --accent: #8b2a2a;
  }
  
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    line-height: 1.6;
  }
  
  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 1.25rem 1.5rem;
  }
  
  .crumb {
    color: var(--muted);
    font-size: 0.95rem;
    margin-bottom: 1rem;
  }
  .crumb a {
    color: var(--accent);
    text-decoration: none;
  }
  .crumb a:hover { text-decoration: underline; }
  
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 0.75rem;
  }
  
  .card {
    background: var(--paper);
    border: 1px solid var(--line);
    padding: 1rem 1.25rem;
    text-decoration: none;
    color: var(--ink);
    transition: border-color 0.15s ease, background 0.15s ease;
    display: block;
    font-weight: 500;
  }
  
  .card:hover {
    background: #fff;
    border-color: var(--ink);
  }
  
  .year-list {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }
  
  .year-item {
    background: var(--paper);
    border: 1px solid var(--line);
    padding: 0.9rem 1.25rem;
    text-decoration: none;
    color: var(--ink);
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: background 0.15s ease, border-color 0.15s ease;
    font-weight: 500;
  }
  
  .year-item:hover {
    background: #fff;
    border-color: var(--ink);
  }
  
  .year-arrow {
    color: var(--muted);
  }
  
  .viewer {
    background: var(--paper);
    border: 1px solid var(--line);
    height: calc(100vh - 90px);
    min-height: 400px;
  }
  
  .viewer iframe {
    width: 100%;
    height: 100%;
    border: none;
  }
  
  .empty {
    color: var(--muted);
    text-align: center;
    padding: 2rem 1rem;
    background: var(--paper);
    border: 1px dashed var(--line);
  }
  
  .empty small {
    display: block;
    margin-top: 0.5rem;
    font-size: 0.8rem;
    opacity: 0.7;
  }
  
  @media (max-width: 640px) {
    .container { padding: 1rem; }
    .viewer { height: calc(100vh - 80px); }
  }
</style>
</head>
<body>
<div class="container">
  <div class="crumb" id="crumb"></div>
  <main id="content">
    <div class="empty">불러오는 중...</div>
  </main>
</div>

<script>
// 설정: 본인의 GitHub 아이디와 저장소 이름을 입력하세요
// =====================================================================
const GITHUB_USER = 'seol0c';
const GITHUB_REPO = 'univ_archive'; 
// =====================================================================

const API_BASE = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents`;
const cache = {};

async function listFolder(path) {
  if (cache[path]) return cache[path];
  const url = `${API_BASE}/${path.split('/').map(encodeURIComponent).join('/')}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`불러오기 실패 (${res.status}): ${path}`);
  const items = await res.json();
  cache[path] = items;
  return items;
}

async function getUniversities() {
  const items = await listFolder('pdfs');
  return items
    .filter(i => i.type === 'dir')
    .map(i => ({ folder: i.name }))
    .sort((a, b) => a.folder.localeCompare(b.folder, 'ko'));
}

async function getYears(univFolder) {
  const items = await listFolder(`pdfs/${univFolder}`);
  return items
    .filter(i => i.type === 'file' && i.name.toLowerCase().endsWith('.pdf'))
    .map(i => ({
      label: i.name.replace(/\.pdf$/i, ''),
      file: i.path
    }))
    .sort((a, b) => b.label.localeCompare(a.label));
}

function setCrumb(parts) {
  const crumbEl = document.getElementById('crumb');
  const html = parts.map((p, i) => {
    const isLast = i === parts.length - 1;
    if (isLast) return p.label;
    return `<a href="${p.href}">${p.label}</a>`;
  }).join(' / ');
  crumbEl.innerHTML = html;
}

async function render() {
  const content = document.getElementById('content');
  const hash = decodeURIComponent(window.location.hash.slice(1));
  
  try {
    if (!hash) {
      setCrumb([{ label: '전체' }]);
      content.innerHTML = '<div class="empty">불러오는 중...</div>';
      const univs = await getUniversities();
      renderHome(content, univs);
      return;
    }
    
    const parts = hash.split('/');
    const univFolder = parts[0];
    const label = parts[1];
    
    content.innerHTML = '<div class="empty">불러오는 중...</div>';
    const years = await getYears(univFolder);
    
    if (!label) {
      setCrumb([
        { label: '전체', href: '#' },
        { label: univFolder }
      ]);
      renderUniv(content, univFolder, years);
      return;
    }
    
    const yearData = years.find(y => y.label === label);
    if (!yearData) {
      setCrumb([
        { label: '전체', href: '#' },
        { label: univFolder }
      ]);
      renderUniv(content, univFolder, years);
      return;
    }
    
    setCrumb([
      { label: '전체', href: '#' },
      { label: univFolder, href: `#${encodeURIComponent(univFolder)}` },
      { label: yearData.label }
    ]);
    renderViewer(content, yearData);
  } catch (err) {
    setCrumb([{ label: '전체' }]);
    content.innerHTML = `
      <div class="empty">
        목록을 불러오지 못했습니다.
        <small>${err.message}</small>
      </div>
    `;
    console.error(err);
  }
}

function renderHome(el, univs) {
  if (univs.length === 0) {
    el.innerHTML = `<div class="empty">아직 등록된 대학이 없습니다.<br><small>pdfs/대학이름/ 형태로 폴더를 만들고 PDF를 올려주세요.</small></div>`;
    return;
  }
  
  const cards = univs.map(u => `
    <a class="card" href="#${encodeURIComponent(u.folder)}">${u.folder}</a>
  `).join('');
  
  el.innerHTML = `<div class="grid">${cards}</div>`;
}

function renderUniv(el, univFolder, years) {
  if (years.length === 0) {
    el.innerHTML = `<div class="empty">아직 등록된 자료가 없습니다.</div>`;
    return;
  }
  
  const items = years.map(y => `
    <a class="year-item" href="#${encodeURIComponent(univFolder)}/${encodeURIComponent(y.label)}">
      <span>${y.label}</span>
      <span class="year-arrow">→</span>
    </a>
  `).join('');
  
  el.innerHTML = `<div class="year-list">${items}</div>`;
}

function renderViewer(el, yearData) {
  const filePath = yearData.file.split('/').map(encodeURIComponent).join('/');
  el.innerHTML = `<div class="viewer"><iframe src="${filePath}" title="${yearData.label}"></iframe></div>`;
}

window.addEventListener('hashchange', render);
render();
</script>
</body>
</html>
